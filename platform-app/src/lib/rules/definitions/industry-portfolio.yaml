# Portfolio / creative industry design rules
composition:
  requiredSections:
    - gallery
    - about
  avoidSections:
    - pricing
    - faq
  maxSectionsPerPage: 6

content:
  toneOverrides:
    - artistic
    - confident
    - authentic
  ctaGuidance: "Use personal CTAs like 'Let's Work Together', 'Start a Project', 'Get in Touch'"
  terminologyAvoid:
    - corporate
    - synergy
    - leverage

tokens:
  sectionSpacing: "py-20 md:py-32"
  typography:
    h1: "text-5xl md:text-6xl lg:text-7xl font-bold leading-none tracking-tight"
    h2: "text-3xl md:text-5xl font-bold leading-tight tracking-tight"
  card: "rounded-none border-0 p-0 shadow-none"
  backgroundAlternation: "Alternate section backgrounds: white → gray-950 → white → gray-50. High contrast, editorial feel."
  intraSpacing: "Within each section: heading→subtitle mb-3, subtitle→content mb-4, content→CTA mb-6. Tight editorial spacing for visual density."

visual:
  heroStyle: "Full-screen portfolio piece or dramatic typography. Let the work speak first."
  colorGuidance: "Monochromatic or muted palette. Let the portfolio work provide the color."
  imageGuidance: "Full-bleed, high-resolution portfolio images. Minimal borders or frames."
  layoutPreference: "Asymmetric, editorial-style layouts. Generous whitespace between sections."
