# Global design rules — apply to all projects
composition:
  maxSectionsPerPage: 8
  requiredSections:
    - hero
    - cta
  headingHierarchy: "h1 for hero headlines ONLY (one per page). h2 for section titles. h3 for card/feature/item titles. h4 for sub-headings within cards. Never skip levels."

content:
  ctaGuidance: "Every page should have at least one clear call-to-action"
  terminologyAvoid:
    - "click here"
    - "submit"
    - "lorem ipsum"

visual:
  imageGuidance: "Prefer high-quality photography over generic illustrations"
  colorUsagePattern: "Use --color-primary for CTAs, key headings, and active states. Use --color-accent for hover states, decorative elements, and secondary highlights. Use --color-surface for alternating section backgrounds. Never use raw hex colors — always reference CSS custom properties."

tokens:
  container: "max-w-6xl mx-auto px-6 lg:px-8"
  sectionSpacing: "py-16 md:py-24"
  typography:
    h1: "text-4xl md:text-5xl lg:text-6xl font-bold leading-tight"
    h2: "text-3xl md:text-4xl font-bold leading-tight"
    h3: "text-xl font-semibold leading-snug"
    body: "text-base md:text-lg leading-relaxed"
    small: "text-sm leading-normal"
    maxWidth: "max-w-2xl"
  card: "rounded-xl border border-gray-100 p-6 md:p-8 shadow-sm hover:shadow-md transition-shadow"
  button:
    primary: "px-6 py-3 rounded-lg font-semibold bg-[var(--color-primary)] text-white hover:opacity-90 transition-opacity"
    secondary: "px-6 py-3 rounded-lg font-semibold border-2 border-[var(--color-primary)] text-[var(--color-primary)] hover:bg-[var(--color-primary)]/5 transition-colors"
  backgroundAlternation: "Alternate section backgrounds: white → gray-50 → white → brand-primary/5. Never stack two sections with the same background."
  focus: "focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--color-primary)]"
  gridGap: "gap-6 md:gap-8"
  intraSpacing: "Within each section: heading→subtitle mb-4, subtitle→content mb-6, content→CTA mb-8 md:mb-12. Use consistent spacing scale (4→6→8→12) for visual rhythm."

compliance:
  accessibilityNotes:
    - "All interactive elements must be keyboard-accessible"
    - "Minimum WCAG AA contrast ratios"
    - "All images must have descriptive alt text"
