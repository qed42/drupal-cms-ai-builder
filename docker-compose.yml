services:
  postgres:
    image: postgres:16-alpine
    container_name: space-ai-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: space
      POSTGRES_PASSWORD: space_dev_password
      POSTGRES_DB: space_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U space -d space_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform:
    build:
      context: .
      dockerfile: platform-app/Dockerfile.dev
    container_name: space-ai-platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /workspace/platform-app
    volumes:
      - ./package.json:/workspace/package.json
      - ./packages:/workspace/packages
      - ./platform-app:/workspace/platform-app
      - /workspace/node_modules
      - /workspace/platform-app/.next
      - ./provisioning:/provisioning
      - ./drupal-site:/drupal-site
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./platform-app/.env.local
    environment:
      - DATABASE_URL=postgresql://space:space_dev_password@postgres:5432/space_platform
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-change-in-production-32chars!
      - JWT_SHARED_SECRET=dev-jwt-secret-change-in-production
      - PROVISION_CALLBACK_KEY=dev-callback-key-change-in-production
      - DB_HOST=ddev-ai-site-builder-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - SITE_DOMAIN_SUFFIX=ai-site-builder.ddev.site
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
