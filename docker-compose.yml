services:
  postgres:
    image: postgres:16-alpine
    container_name: space-ai-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: space
      POSTGRES_PASSWORD: space_dev_password
      POSTGRES_DB: space_platform
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
